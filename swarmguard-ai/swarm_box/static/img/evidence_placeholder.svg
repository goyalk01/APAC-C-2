<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#18181b"/>
  <rect x="1" y="1" width="598" height="398" fill="none" stroke="#27272a" stroke-width="2"/>
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#27272a" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="url(#grid)"/>
  <!-- Icon -->
  <circle cx="300" cy="140" r="40" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.6"/>
  <text x="300" y="150" font-family="monospace" font-size="36" fill="#ef4444" text-anchor="middle" opacity="0.8">⚠</text>
  <!-- Title -->
  <text x="300" y="220" font-family="sans-serif" font-size="18" fill="#f8fafc" text-anchor="middle" font-weight="600">EVIDENCE PULL</text>
  <!-- Subtitle -->
  <text x="300" y="248" font-family="monospace" font-size="13" fill="#94a3b8" text-anchor="middle">Visual proof cached on edge node</text>
  <!-- Hash display area -->
  <rect x="120" y="275" width="360" height="36" rx="6" fill="#09090b" stroke="#27272a"/>
  <text x="300" y="298" font-family="monospace" font-size="12" fill="#ef4444" text-anchor="middle" id="hash-text">sha256:awaiting_selection...</text>
  <!-- Status -->
  <text x="300" y="360" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Select an alert to request evidence from the originating node</text>
</svg>
