version: '3.8'

services:
  mesh-relay:
    image: python:3.11-slim
    container_name: swarmguard-mesh-relay
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "pip install websockets && python -m swarmguard-ai.mesh_network.mesh_relay"
    ports:
      - "8765:8765"
    restart: unless-stopped

  api-backend:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: swarmguard-api-backend
    ports:
      - "8010:8010"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8010
      - MESH_RELAY_URL=ws://mesh-relay:8765
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
      # - SWARMBOX_API_KEY=your_production_api_key_here
      # - SENTRY_DSN=your_backend_sentry_dsn_here
    depends_on:
      - mesh-relay
    restart: unless-stopped
